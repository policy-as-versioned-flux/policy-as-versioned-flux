apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 1h
  releaseName: kyverno
  chart:
    spec:
      chart: kyverno
      # Pinned (ADR-0003): chart 3.8.2 == app v1.18.2, satisfying the
      # Kyverno >=1.18 hard dependency (CEL ValidatingPolicy background-scan
      # PolicyReports fixed in 1.17.2, GA/Stable ValidatingPolicy API in 1.18).
      # The engine is a governed dependency, bumped via the same reviewed
      # Renovate PR path as policy.
      version: "3.8.2"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: kyverno
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
