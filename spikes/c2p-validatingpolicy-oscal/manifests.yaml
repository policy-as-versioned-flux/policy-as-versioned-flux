apiVersion: v1
kind: Namespace
metadata:
  name: spike
---
# Lane-keeping style control mapped to NIST CM-8 (asset inventory/ownership).
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-team-label
spec:
  validationActions: [Audit]
  autogen: {}
  evaluation:
    background:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  validations:
    - expression: "has(object.metadata.labels) && 'team' in object.metadata.labels"
      message: "Pods must carry a 'team' label (CM-8 asset inventory)."
---
# Gate style control mapped to NIST SC-7 (boundary protection).
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: disallow-host-network
spec:
  validationActions: [Audit]
  autogen: {}
  evaluation:
    background:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  validations:
    - expression: "!has(object.spec.hostNetwork) || object.spec.hostNetwork == false"
      message: "Pods must not use host network (SC-7 boundary protection)."
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-good
  namespace: spike
  labels:
    team: platform
    app: demo
spec:
  containers:
    - name: c
      image: registry.k8s.io/pause:3.10
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-bad          # missing team label -> require-team-label FAIL
  namespace: spike
spec:
  containers:
    - name: c
      image: registry.k8s.io/pause:3.10
