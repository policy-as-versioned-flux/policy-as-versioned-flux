# MINIMAL STAND-IN CRD — not the real thing. See the header of
# s3-bucketserversideencryptionconfiguration.crd.yaml for the full rationale.
# Real CRD `instances.rds.aws.m.upbound.io` ships from the Upbound AWS RDS
# provider-family package (fleet PR #6, ticket 18). Here we register only a
# schema-permissive stand-in so Kyverno can admit + background-scan the CR; the
# CEL policy reads spec.forProvider.multiAz, which the permissive schema allows.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: instances.rds.aws.m.upbound.io
spec:
  group: rds.aws.m.upbound.io
  scope: Namespaced
  names:
    plural: instances
    singular: instance
    kind: Instance
    listKind: InstanceList
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
