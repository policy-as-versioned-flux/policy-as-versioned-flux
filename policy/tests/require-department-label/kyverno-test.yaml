apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: require-department-label
policies:
  - ../../workloads/kyverno/require-department-label/policy.yaml
resources:
  - pod-pass.yaml
  - pod-fail.yaml
  - pod-unversioned.yaml
results:
  # department label present + carries this policy's version -> Audit pass
  - isValidatingPolicy: true
    kind: Pod
    policy: require-department-label
    resources:
      - pod-pass
    result: pass
  # department label missing, carries this policy's version -> Audit fail
  - isValidatingPolicy: true
    kind: Pod
    policy: require-department-label
    resources:
      - pod-fail
    result: fail
  # no policy-version label at all -> objectSelector doesn't match -> skip
  # (this is the version self-scoping fixture)
  - isValidatingPolicy: true
    kind: Pod
    policy: require-department-label
    resources:
      - pod-unversioned
    result: skip
