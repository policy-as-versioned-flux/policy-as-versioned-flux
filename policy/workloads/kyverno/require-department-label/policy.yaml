apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-department-label
  annotations:
    policies.kyverno.io/title: Require department label
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Lane-keeping (Audit): every Pod carries a `department` label so cost and
      ownership can be attributed. See ../../rationale/require-department-label/rationale.md
      for the "why". This version's nameSuffix and policy-version selector value are
      substituted by kustomize (see kustomization.yaml) — this base file is the
      version-agnostic source.
spec:
  # Lane-keeping, not a gate: nudge + PolicyReport, never blocks admission (ADR-0003).
  validationActions:
    - Audit
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
    # Version self-scoping (PRD §6.4): only workloads opted in to this exact policy
    # version are matched. Value is substituted per-version by kustomize.
    objectSelector:
      matchLabels:
        mycompany.com/policy-version: 0.0.0-unset
  validations:
    - expression: "has(object.metadata.labels) && 'department' in object.metadata.labels"
      message: "Pods must carry a 'department' label for cost and ownership attribution."
