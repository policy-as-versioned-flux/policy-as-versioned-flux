apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The label value below drives the version self-selector on the policy itself
# (via replacements), per the coexistence pattern in PRD §6.4.
resources:
  - policy.yaml

# ponytail: kustomize can't derive nameSuffix from another field (no
# replacements target for it), so this is a second, hand-synced "1.0.0"
# literal -- bump it together with the labels value below. Upgrade path if
# this drifts in practice: a per-version kustomize component, or a tiny
# `kustomize edit set nameSuffix "-$VERSION"` step in the release process.
nameSuffix: -1.0.0

labels:
  - pairs:
      mycompany.com/policy-version: "1.0.0"
    includeSelectors: false

replacements:
  - source:
      kind: ValidatingPolicy
      fieldPath: metadata.labels.[mycompany.com/policy-version]
    targets:
      - select:
          kind: ValidatingPolicy
        fieldPaths:
          - spec.matchConstraints.objectSelector.matchLabels.[mycompany.com/policy-version]
